plugins {
    id 'com.android.application'
}

def appVersionName = "2.1.03"

import javax.inject.Inject
// --- Git helper for versionCode and short hash ---
class GitHelper {
    private final ExecOperations execOperations

    @Inject
    GitHelper(ExecOperations execOperations) {
        this.execOperations = execOperations
    }

    int getCommitCount() {
        try {
            def stdout = new ByteArrayOutputStream()
            execOperations.exec { spec ->
                spec.commandLine = ['git', 'rev-list', '--count', 'HEAD']
                spec.standardOutput = stdout
            }
            return Integer.parseInt(stdout.toString().trim())
        } catch (Exception e) {
            return 1
        }
    }
}

// --- Instantiate GitHelper ---
def gitHelper = new GitHelper(services.get(ExecOperations))

android {
    namespace = 'com.smorgasbork.hotdeath'
    compileSdk = 36

    defaultConfig {
        minSdk = 21
        targetSdk = 36
        versionCode = gitHelper.getCommitCount()
        versionName = appVersionName
    }

    flavorDimensions = ["version"]
    productFlavors {
        production {
            dimension = "version"
            applicationId = "com.smorgasbork.hotdeath"
            versionName = appVersionName // manual production version
        }
        staging {
            dimension = "version"
            applicationId = "com.smorgasbork.hotdeath.staging"
            versionName = "${appVersionName}-staging"
        }
    }

    buildTypes {
        release {
            minifyEnabled = true
            proguardFiles = [getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro']
            signingConfig = signingConfigs.debug
        }
        debug {
            versionNameSuffix = 'g'
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'com.caverock:androidsvg-aar:1.4'
}
